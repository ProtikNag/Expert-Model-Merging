seed: 42
experiment: glue_roberta
model:
  name: roberta-base
  head_dropout: 0.1
data:
  tasks: [cola, sst2, mrpc, qqp, mnli, qnli, rte]
  max_length: 128
  batch_size: 32
  train_subset: null            # use full train split
  val_subset: null
train:
  epochs: 3
  lr: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.06
fisher:
  n_samples: 1024
  batch_size: 8                 # batch for data loading; per-sample grads inside
grams:
  n_samples: 1024
  batch_size: 32
  recollect_n_samples: 256       # used by whc_tree_iter to refresh Grams
merging:
  n_hparams_per_method: 8       # matched sweep budget
  task_arith:
    scale_grid: [0.1, 0.15, 0.2, 0.25, 0.3, 0.4, 0.6, 1.0]
  ties:
    keep_frac_grid: [0.1, 0.15, 0.2, 0.3, 0.5, 0.7]
    scale_grid: [0.3, 0.5, 0.7, 1.0]
  regmean:
    alpha_grid: [0.0, 0.3, 0.5, 0.7, 0.9, 1.0]
  regmean_plus:
    alpha_grid: [0.0, 0.5, 0.9, 1.0]
  fisher_merge:
    # no hparam; report once
    placeholder: [null]
  whc_tree:
    # WHC binary-tree pairwise merge (whc.pdf Eq. 26). λ only.
    lam_grid: [1.0e-6, 1.0e-5, 1.0e-4, 1.0e-3, 1.0e-2, 1.0e-1, 1.0, 10.0]
  whc_tree_fisher:
    # γ injects diag(F̄_in) into the Tikhonov ridge (Eq. 19/20 ablation).
    lam_grid:   [1.0e-5, 1.0e-4, 1.0e-3, 1.0e-2]
    gamma_grid: [1.0e-3, 1.0e-2, 1.0e-1, 1.0]
  whc_tree_grad:
    # β multiplies the -α_i g_i correction term (Eq. 27).
    lam_grid:  [1.0e-5, 1.0e-4, 1.0e-3, 1.0e-2]
    beta_grid: [0.1, 0.3, 1.0]
  whc_tree_full:
    # Full Eq. (29): λ + γ Fisher ridge + β gradient correction together.
    lam_grid:   [1.0e-4, 1.0e-3, 1.0e-2]
    gamma_grid: [1.0e-2, 1.0e-1, 1.0]
    beta_grid:  [0.0, 0.3, 1.0]
  whc_tree_iter:
    # Iterative re-linearization (whc.pdf §7.2 Fix 3), small focused grid.
    lam_grid:   [1.0e-4, 1.0e-3]
    gamma_grid: [0.1, 1.0]
    beta_grid:  [0.0, 0.3]
    K_grid:     [1, 2]
paths:
  checkpoints: ./checkpoints/glue
  results: ./results/glue
  figures: ./results/glue/figures
  logs: ./results/logs
