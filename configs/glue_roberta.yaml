seed: 42
experiment: glue_roberta
model:
  name: roberta-base
  head_dropout: 0.1
data:
  tasks: [cola, sst2, mrpc, qqp, mnli, qnli, rte]
  max_length: 128
  batch_size: 32
  train_subset: null            # use full train split
  val_subset: null
train:
  epochs: 3
  lr: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.06
fisher:
  n_samples: 1024
  batch_size: 8                 # batch for data loading; per-sample grads inside
grams:
  n_samples: 1024
  batch_size: 32
merging:
  curvature_source: taskvec     # default: dataless proxy
  n_hparams_per_method: 8       # matched sweep budget
  task_arith:
    scale_grid: [0.1, 0.15, 0.2, 0.25, 0.3, 0.4, 0.6, 1.0]
  ties:
    keep_frac_grid: [0.1, 0.15, 0.2, 0.3, 0.5, 0.7]
    scale_grid: [0.3, 0.5, 0.7, 1.0]
  regmean:
    alpha_grid: [0.0, 0.3, 0.5, 0.7, 0.9, 1.0]
  regmean_plus:
    alpha_grid: [0.0, 0.5, 0.9, 1.0]
  fisher_merge:
    # no hparam; report once
    placeholder: [null]
  fisher_ridge:
    eps_grid: [1.0e-8, 1.0e-7, 1.0e-6, 1.0e-5, 1.0e-4, 1.0e-3, 1.0e-2, 1.0e-1]
  whc_a:
    lam_grid: [1.0e-8, 1.0e-6, 1.0e-5, 1.0e-4, 1.0e-3, 1.0e-2, 1.0e-1, 1.0]
  whc_b:
    lam0_grid: [1.0e-6, 1.0e-5, 1.0e-4, 1.0e-3]
    rho_grid:  [0.25, 0.5, 1.0]
    fanout: 2
  whc_c:
    lam0_grid: [1.0e-6, 1.0e-5, 1.0e-4, 1.0e-3]
    rho_grid:  [0.25, 0.5, 1.0]
  whc_d:
    lam_grid:  [1.0e-6, 1.0e-5, 1.0e-4, 1.0e-3, 1.0e-2]
    order: natural              # natural | magnitude | random
paths:
  checkpoints: ./checkpoints/glue
  results: ./results/glue
  figures: ./results/glue/figures
  logs: ./results/logs
